<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Archivos Clasificados</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <h1>Contáctanos</h1>
        <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="formulario.html">Contacto</a></li>
                </ul>
         </nav>
    </header>

    <main class="main-content">
        <section class="form-container">
            <h2>Reportar avistamiento de Héroe/Villano</h2>
            <form action="#" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="nombre">Nombre del informante:</label>
                    <input type="text" id="nombre" name="nombre" required aria-required="true">
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Detalles del reporte:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                </div>

                <button type="submit">Enviar Reporte Clasificado</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p><small>&copy; 2026 Agencia de Control de Metahumanos.</small></p>
    </footer>
</body>
</html>
