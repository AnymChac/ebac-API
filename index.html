<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivos Clasificados</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="js/app.js"></script>
</head>
<body>
    <header class="header">
        <h1>Héroes y Villanos</h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="formulario.html">Contacto</a></li>
                </ul>
            </nav>
    <form id="search-form" class="search-form">
        <label for="search-input" class="visually-hidden" style="display:none;">Buscar personaje:</label>
        <input type="text" id="search-input" placeholder="Buscar personaje (ej. Batman)..." required>
        <button type="submit" aria-label="Ejecutar búsqueda">Buscar</button>
    </form>
</header>

    <main class="main-content">
        <section id="results-section" class="results-grid" aria-label="Resultados de búsqueda">
            </section>

        <dialog id="hero-modal" class="hero-modal">
            <article id="modal-content" class="modal-content">
                </article>
            <button id="close-modal" class="close-btn">Cerrar Archivo</button>
        </dialog>
    </main>

    <footer class="footer">
       <p><small>Datos proporcionados por <span lang="en">Superhero API</span>.</small></p>
    </footer>
</body>
</html>
